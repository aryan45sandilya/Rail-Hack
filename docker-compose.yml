version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: railhack_db
    environment:
      POSTGRES_DB: railhack
      POSTGRES_USER: railuser
      POSTGRES_PASSWORD: railpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U railuser -d railhack"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: railhack_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: railhack_backend
    environment:
      - DATABASE_URL=postgresql://railuser:railpassword@db:5432/railhack
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_data:/app/model

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: railhack_frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  model_data:
